<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI 생존능력 테스트</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 시작 화면 -->
<div id="start-screen" class="container">

  <h1>AI 생존능력 테스트</h1>

  <p>
    AI 시대 속 나는 얼마나 준비되어 있을까?
  </p>

  <button id="start-btn">
    테스트 시작
  </button>

</div>

<!-- 로딩 화면 -->
<div id="loading-screen" class="container hidden">

  <h1>질문 준비 중...</h1>

  <div class="loader"></div>

  <p>
    AI시대 티어 측정 준비 중...
  </p>

</div>

<!-- 질문 화면 -->
<div id="quiz-screen" class="container hidden">

  <div id="progress"></div>

  <h2 id="question"></h2>

  <div id="answers"></div>

</div>

<!-- 결과 화면 -->
<div id="result-screen" class="container hidden"></div>

<script src="script.js"></script>

</body>
</html>
