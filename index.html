<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 생존능력 테스트</title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#eef2ff;
      color:#222;
    }

    .screen{
      width:90%;
      max-width:700px;
      margin:40px auto;
      background:white;
      border-radius:20px;
      padding:40px 30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .hidden{
      display:none;
    }

    h1{
      font-size:38px;
      margin-bottom:10px;
      color:#3b5bdb;
    }

    h2{
      line-height:1.5;
      margin-bottom:30px;
    }

    p{
      line-height:1.6;
    }

    button{
      width:100%;
      padding:16px;
      margin-top:12px;
      border:none;
      border-radius:14px;
      background:#4c6ef5;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#3b5bdb;
      transform:translateY(-2px);
    }

    #progress{
      margin-bottom:20px;
      font-weight:bold;
      color:#666;
    }

    .result-grade{
      font-size:60px;
      font-weight:bold;
      color:#4c6ef5;
      margin:20px 0;
    }

    .score-box{
      background:#f1f3f5;
      padding:20px;
      border-radius:16px;
      margin-top:20px;
      text-align:left;
    }

    .bar-wrap{
      margin-top:15px;
    }

    .bar-title{
      margin-bottom:5px;
      font-weight:bold;
    }

    .bar{
      width:100%;
      height:18px;
      background:#dee2e6;
      border-radius:999px;
      overflow:hidden;
    }

    .fill{
      height:100%;
      background:#4c6ef5;
      border-radius:999px;
    }

    .desc{
      margin-top:25px;
      font-size:18px;
      line-height:1.8;
    }

    .loader{
      width:50px;
      height:50px;
      border:6px solid #dbe4ff;
      border-top:6px solid #4c6ef5;
      border-radius:50%;
      margin:30px auto;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

  </style>
</head>

<body>

<!-- 시작 화면 -->
<div id="start-screen" class="screen">

  <h1>AI 생존능력 테스트</h1>

  <p>
    AI 시대 속에서 나는 얼마나 준비되어 있을까?
    <br><br>
    질문에 답하고 나의 AI 활용 능력을 확인해보세요.
  </p>

  <button id="start-btn">테스트 시작</button>

</div>

<!-- 로딩 화면 -->
<div id="loading-screen" class="screen hidden">

  <h2>결과 분석 중...</h2>

  <div class="loader"></div>

</div>

<!-- 질문 화면 -->
<div id="quiz-screen" class="screen hidden">

  <div id="progress"></div>

  <h2 id="question"></h2>

  <div id="answers"></div>

</div>

<!-- 결과 화면 -->
<div id="result-screen" class="screen hidden"></div>

<script>
